[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Arc testnet is EVM-compatible; pin to paris to avoid PUSH0/transient-storage opcodes
# that some L2s/alt-chains don't support yet.
evm_version = "paris"

[fmt]
line_length = 110
